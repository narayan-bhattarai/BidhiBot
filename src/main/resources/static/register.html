<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विधिBot - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --primary: #1e3a8a;
            /* Deep blue fitting for law/constitution */
            --primary-hover: #1e40af;
            --bg: #f8fafc;
            --text: #1e293b;
            --accent: #dc2626;
            /* Red accent matching Nepal flag */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .split-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .image-section {
            flex: 1;
            background: url('images/bg-constitution.png') center/cover no-repeat;
            position: relative;
            display: none;
        }

        @media (min-width: 768px) {
            .image-section {
                display: block;
            }
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.85) 0%, rgba(15, 23, 42, 0.9) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 3rem;
        }

        .overlay-text {
            animation: fadeIn 1s ease-out;
        }

        .overlay-text h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            color: white;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .overlay-text p {
            font-size: 1.25rem;
            opacity: 0.9;
            max-width: 500px;
            line-height: 1.6;
            color: #f1f5f9;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: white;
            max-width: 100%;
            position: relative;
        }

        @media (min-width: 768px) {
            .form-section {
                max-width: 50vw;
            }
        }

        .register-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-height: 90vh;
            /* Handle smaller screens if content is tall */
            overflow-y: auto;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .logo-img {
            height: 90px;
            margin-bottom: 1rem;
            object-fit: contain;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #475569;
        }

        input,
        select {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
            background: #f8fafc;
            font-size: 1rem;
            color: #1e293b;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            font-size: 1rem;
            box-shadow: 0 4px 6px -1px rgba(30, 58, 138, 0.2);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.875rem;
            color: #64748b;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        #error-msg {
            color: var(--accent);
            font-size: 0.875rem;
            text-align: center;
            margin-top: 1rem;
            min-height: 1.25rem;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="split-layout">
        <div class="image-section">
            <div class="image-overlay">
                <div class="overlay-text">
                    <h1>विधिBot</h1>
                    <p>Your Intelligent Legal Assistant grounded in the Constitution of Nepal and prevailing laws.</p>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="register-card">
                <div class="logo-container">
                    <img src="images/logo-constitution.png" alt="Constitution Logo" class="logo-img">
                    <div class="logo-text">Create Account</div>
                </div>
                <div class="subtitle">Join the future of legal intelligence</div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Choose a unique username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a strong password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role">
                        <option value="USER">User (Standard Access)</option>
                        <option value="ADMIN">Admin (Upload & Manage)</option>
                    </select>
                </div>

                <button onclick="handleRegister()">Get Started</button>
                <div id="error-msg"></div>

                <div class="footer">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function handleRegister() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.querySelector('button');

            if (!username || !password) {
                errorMsg.innerText = "Please fill in all fields.";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Creating account...";
            errorMsg.innerText = "";

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });

                if (response.ok) {
                    alert('Registration successful! Redirecting to login...');
                    window.location.href = 'login.html';
                } else {
                    const text = await response.text();
                    errorMsg.innerText = text || "Registration failed";
                }
            } catch (e) {
                errorMsg.innerText = "Connection lost. Try again later.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Get Started";
            }
        }
    </script>
</body>

</html>
